name: Deploy Storybook

on:
  # Deploy Storybook on every push to main.
  push:
    branches: [main]

# Required permissions for GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel older Storybook deploy runs for the same branch.
concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Storybook
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Checkout source.
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Node.js runtime.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Cache node_modules based on lockfile.
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node20-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-modules-

      # Install dependencies.
      - name: Install dependencies
        run: npm ci

      # Build Storybook static files.
      - name: Build Storybook
        run: npm run build-storybook

      # Configure GitHub Pages.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Upload generated Storybook as Pages artifact.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static/

      # Deploy artifact to GitHub Pages.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
